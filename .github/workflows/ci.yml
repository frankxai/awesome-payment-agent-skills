name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: README sanity check
        run: |
          test -s README.md || { echo "README.md is missing or empty"; exit 1; }
          echo "README.md is non-empty"

      - name: Check for empty markdown link targets
        run: |
          if grep -rnE '\]\(\s*\)' --include='*.md' .; then
            echo "Found markdown links with empty targets"
            exit 1
          fi
          echo "No empty markdown link targets found"
